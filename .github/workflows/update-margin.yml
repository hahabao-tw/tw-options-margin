name: 更新選擇權保證金 A/B/C 值

on:
  schedule:
    # GitHub 的排程用 UTC 時間。台北 = UTC+8
    #   早上 8:00 (台北) = 00:00 UTC
    #   晚上 8:00 (台北) = 12:00 UTC
    # 註：GitHub 排程可能延遲幾分鐘到十幾分鐘，但保證金一天最多變動一次，不影響。
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  # 允許在 Actions 頁面手動按按鈕立即執行
  workflow_dispatch:

# 給予 commit 回 repo 的權限
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 執行抓取腳本
        run: python update_margin.py

      - name: 若有變動則 commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain margin_data.json)" ]; then
            git add margin_data.json
            git commit -m "自動更新選擇權保證金 A/B/C 值"
            git push
            echo "已更新並推送 margin_data.json"
          else
            echo "保證金數值無變動，略過 commit"
          fi
